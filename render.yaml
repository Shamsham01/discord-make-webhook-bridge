services:
  - type: web
    name: discord-make-webhook-bridge
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATA_FILE
        value: /data/guilds.json
      - key: ALLOWED_WEBHOOK_HOSTS
        value: "*.make.com"
      - key: WEBHOOK_TIMEOUT_MS
        value: "120000"
    disk:
      name: bridge-data
      mountPath: /data
      sizeGB: 1
